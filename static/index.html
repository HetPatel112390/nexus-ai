<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI</title>
    <!-- iOS Native App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nexus AI">
    <meta name="theme-color" content="#0f111a">
    <!-- End iOS Meta Tags -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f111a;
            --bg-surface: #1e2136;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* LIVE WALLPAPER BACKGROUND */
        #glow {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.08) 0%, rgba(0, 0, 0, 0) 50%);
            z-index: 0;
            pointer-events: none;
        }

        /* HEADER */
        .header {
            width: 100%;
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 17, 26, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 20;
            position: fixed;
            top: 0;
            left: 0;
            transition: opacity 0.5s;
            opacity: 0;
            pointer-events: none;
        }

        .header.chat-active {
            opacity: 1;
            pointer-events: auto;
        }

        .header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #fff;
        }

        /* MAIN CHAT COLUMN */
        .chat-history {
            width: 100%;
            max-width: 800px;
            height: 100%;
            padding: 80px 1rem 140px 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .chat-history.chat-active {
            opacity: 1;
        }

        .chat-history::-webkit-scrollbar { width: 0px; background: transparent; }

        .message {
            display: flex;
            flex-direction: column;
            width: 100%;
            animation: fadeUp 0.4s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-items: flex-end; }
        .message.ai { align-items: flex-start; }

        .bubble {
            max-width: 90%;
            padding: 1rem 1.25rem;
            border-radius: 24px;
            font-size: 1rem;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user .bubble {
            background: var(--bg-surface);
            color: #fff;
            border: 1px solid var(--border);
            border-bottom-right-radius: 6px;
        }

        .message.ai .bubble {
            background: transparent;
            color: var(--text-main);
            padding: 0; 
            max-width: 100%;
        }

        /* MARKDOWN STYLING */
        .bubble p { margin-bottom: 1rem; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble strong { font-weight: 600; color: #fff; }
        .bubble h1, .bubble h2, .bubble h3 { margin: 1.5rem 0 1rem 0; color: #fff; }
        .bubble ul, .bubble ol { margin-left: 1.5rem; margin-bottom: 1rem; }
        .bubble pre { 
            background: #11131c; 
            padding: 1rem; 
            border-radius: 12px; 
            overflow-x: auto; 
            border: 1px solid var(--border);
            margin: 1rem 0;
        }
        .bubble code { 
            background: rgba(255,255,255,0.1); 
            padding: 0.2rem 0.4rem; 
            border-radius: 6px; 
            font-size: 0.9em;
            font-family: monospace;
            color: #818cf8;
        }
        .bubble pre code { background: transparent; padding: 0; color: #e2e8f0; }

        .label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        /* HERO TITLE */
        .hero-title {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
            transition: all 0.5s ease;
            width: 100%;
        }
        .hero-title h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-title p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .hero-title.chat-active {
            opacity: 0;
            transform: translate(-50%, -100%);
            pointer-events: none;
        }

        /* DYNAMIC INPUT AREA */
        .input-area {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 30;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-area.chat-active {
            top: auto;
            bottom: 0;
            left: 0;
            transform: none;
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg-dark) 80%, transparent);
        }

        .input-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: flex-end;
            background: rgba(30, 33, 48, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 0.5rem 0.5rem 0.5rem 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within { border-color: var(--accent); }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.75rem 0;
            font-size: 16px;
            line-height: 1.5;
            outline: none;
            resize: none;
            height: 48px;
            max-height: 150px;
        }

        textarea::placeholder { color: rgba(255, 255, 255, 0.4); }

        button {
            background: #fff;
            color: var(--bg-dark);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            flex-shrink: 0;
        }

        button:active { transform: scale(0.9); }

        .typing-indicator {
            display: none;
            gap: 6px;
            padding: 1rem 0;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="glow"></div>
    
    <div class="hero-title" id="heroTitle">
        <h1>NEXUS AI</h1>
        <p>Ask anything about your enterprise data.</p>
    </div>

    <div class="header" id="appHeader">
        <h1>NEXUS AI</h1>
    </div>

    <div class="chat-history" id="chatHistory">
        <!-- Messages will appear here -->
    </div>

    <div class="input-area" id="inputArea">
        <div class="input-wrapper">
            <textarea 
                id="userInput" 
                placeholder="Message Nexus AI..." 
                rows="1"
                oninput="this.style.height = '';this.style.height = Math.min(this.scrollHeight, 150) + 'px'"
            ></textarea>
            <button id="sendBtn" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const inputField = document.getElementById("userInput");
        const chatHistory = document.getElementById("chatHistory");
        const sendBtn = document.getElementById("sendBtn");
        let isFirstMessage = true;

        inputField.addEventListener("keydown", function(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;
            
            // Trigger the animation to move the search bar to the bottom
            if (isFirstMessage) {
                document.getElementById('inputArea').classList.add('chat-active');
                document.getElementById('chatHistory').classList.add('chat-active');
                document.getElementById('appHeader').classList.add('chat-active');
                document.getElementById('heroTitle').classList.add('chat-active');
                isFirstMessage = false;
            }

            inputField.value = "";
            inputField.style.height = "48px";
            appendMessage("You", text, "user");

            const aiMessageDiv = appendMessage("Nexus AI", "", "ai");
            const bubble = aiMessageDiv.querySelector(".bubble");
            
            bubble.innerHTML = `
                <div class="typing-indicator" style="display: flex;">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            `;
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                const url = `/api/stream?question=${encodeURIComponent(text)}`;
                const source = new EventSource(url);
                let fullResponse = "";
                let isFirstToken = true;

                source.onmessage = function(event) {
                    if (event.data === "[DONE]") {
                        source.close();
                        bubble.innerHTML = marked.parse(fullResponse);
                        chatHistory.scrollTop = chatHistory.scrollHeight;
                        return;
                    }
                    if (event.data.startsWith("[ERROR]")) {
                        source.close();
                        bubble.innerHTML = "<strong style='color:#ef4444'>Network Error:</strong> " + event.data.replace("[ERROR]", "");
                        return;
                    }

                    if (isFirstToken) {
                        bubble.innerHTML = "";
                        isFirstToken = false;
                    }

                    const token = event.data.replace(/<br>/g, '\n');
                    fullResponse += token;
                    bubble.innerHTML = marked.parse(fullResponse);
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                };

                source.onerror = function(err) {
                    source.close();
                    bubble.innerHTML = "<strong style='color:#ef4444'>Network Error:</strong> Could not connect to the stream. Check backend logs.";
                };

            } catch (error) {
                bubble.innerHTML = "<strong style='color:#ef4444'>Error:</strong> " + error.message;
            }
        }

        function appendMessage(sender, text, type) {
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${type}`;
            
            let parsedText = marked.parse(text || "");
            
            msgDiv.innerHTML = `
                <div class="label">${sender}</div>
                <div class="bubble">${parsedText}</div>
            `;
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return msgDiv;
        }
    </script>
</body>
</html>
