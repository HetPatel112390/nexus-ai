<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI</title>
    <!-- iOS Native App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nexus AI">
    <meta name="theme-color" content="#050505">
    <!-- End iOS Meta Tags -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f111a;
            --bg-surface: #1a1d2d;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.5);
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* LIVE WALLPAPER BACKGROUND */
        #glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 40%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
            filter: blur(50px);
            left: 50%;
            top: 50%;
            animation: pulseGlow 8s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        /* MAIN CHAT COLUMN (SAME FOR MOBILE AND DESKTOP) */
        .container {
            width: 100%;
            max-width: 850px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            background: transparent;
        }

        /* HEADER */
        .header {
            padding: 1.5rem;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            background: rgba(15, 17, 26, 0.8);
            z-index: 20;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* CHAT HISTORY */
        .chat-history {
            flex: 1;
            padding: 2rem 1.5rem 120px 1.5rem; /* Extra padding at bottom for input */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            scroll-behavior: smooth;
            width: 100%;
        }

        .chat-history::-webkit-scrollbar {
            width: 4px;
        }
        .chat-history::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            width: 100%;
            animation: fadeUp 0.5s ease forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-items: flex-end;
        }

        .message.ai {
            align-items: flex-start;
        }

        .bubble {
            max-width: 85%;
            padding: 1rem 1.25rem;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .message.user .bubble {
            background: var(--bg-surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-bottom-right-radius: 4px;
        }

        .message.ai .bubble {
            background: transparent;
            color: var(--text-main);
            padding: 0; /* Clean look for AI */
            max-width: 100%;
        }

        /* MARKDOWN STYLING */
        .bubble p { margin-bottom: 1rem; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble strong { font-weight: 600; color: #fff; }
        .bubble h1, .bubble h2, .bubble h3 { margin-bottom: 1rem; margin-top: 1.5rem; color: #fff; }
        .bubble h1:first-child, .bubble h2:first-child, .bubble h3:first-child { margin-top: 0; }
        .bubble ul, .bubble ol { margin-left: 1.5rem; margin-bottom: 1rem; }
        .bubble li { margin-bottom: 0.5rem; }
        
        /* Code Blocks */
        .bubble pre { 
            background: #11131c; 
            padding: 1.25rem; 
            border-radius: 12px; 
            overflow-x: auto; 
            margin-top: 0.5rem;
            margin-bottom: 1rem; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .bubble code { 
            font-family: 'Courier New', Courier, monospace; 
            background: rgba(255,255,255,0.1); 
            padding: 0.2rem 0.4rem; 
            border-radius: 6px; 
            font-size: 0.85em;
            color: #818cf8;
        }
        .bubble pre code {
            background: transparent;
            padding: 0;
            color: #e2e8f0;
        }

        .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        /* CENTERED FLOATING INPUT AREA */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            background: linear-gradient(to top, var(--bg-dark) 60%, transparent);
            display: flex;
            justify-content: center;
            z-index: 30;
        }

        .input-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: flex-end;
            background: rgba(30, 33, 48, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 0.5rem 0.5rem 0.5rem 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 20px rgba(99, 102, 241, 0.1);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.75rem 0;
            font-size: 1rem;
            line-height: 1.5;
            outline: none;
            resize: none;
            height: 50px;
            max-height: 150px;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        button {
            background: var(--text-main);
            color: var(--bg-dark);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 0.5rem;
            margin-bottom: 5px;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: scale(1.05);
            background: #fff;
        }

        button:active {
            transform: scale(0.95);
        }

        /* LOADING ANIMATION */
        .typing-indicator {
            display: none;
            gap: 6px;
            padding: 1rem 0;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* MOBILE SPECIFIC TWEAKS */
        @media (max-width: 768px) {
            .header { padding: 1rem; }
            .chat-history { padding: 1rem 1rem 100px 1rem; }
            .input-area { padding: 1rem; }
            .input-wrapper { border-radius: 20px; padding: 0.25rem 0.25rem 0.25rem 1rem; }
            textarea { height: 45px; font-size: 16px; /* 16px prevents iOS zoom */ }
            button { width: 35px; height: 35px; margin-bottom: 5px; }
            .bubble { max-width: 90%; }
        }
    </style>
</head>
<body>

    <!-- ADVANCED ANIMATED BACKGROUND -->
    <div class="bg-grid"></div>
    <div id="glow"></div>

    <!-- MAIN CHAT INTERFACE -->
    <div class="container">
        
        <div class="header">
            <h1>NEXUS AI</h1>
        </div>

        <div class="chat-history" id="chatHistory">
            <div class="message ai">
                <span class="label">Nexus AI</span>
                <div class="bubble">System Online. Connected to Enterprise Knowledge Base.<br><br>I am designed for ultra-fast, high-precision answers. Ask me anything about your documents or data.</div>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="questionInput" placeholder="Message Nexus AI... (Shift+Enter for new line)" autocomplete="off"></textarea>
                <button id="sendBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. LIVE WALLPAPER (MOUSE TRACKING GLOW) ---
        const glow = document.getElementById('glow');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        
        // Follow cursor
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Smooth animation loop for the glow
        let currentX = mouseX;
        let currentY = mouseY;
        
        function animateGlow() {
            currentX += (mouseX - currentX) * 0.05;
            currentY += (mouseY - currentY) * 0.05;
            glow.style.left = currentX + 'px';
            glow.style.top = currentY + 'px';
            requestAnimationFrame(animateGlow);
        }
        animateGlow();

        // Pulsate effect on click
        document.addEventListener('mousedown', () => {
            glow.style.width = '700px';
            glow.style.height = '700px';
        });
        document.addEventListener('mouseup', () => {
            glow.style.width = '600px';
            glow.style.height = '600px';
        });


        // --- 2. CHAT LOGIC ---
        const chatHistory = document.getElementById('chatHistory');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        questionInput.addEventListener('keydown', function (e) {
            // Send on Enter (but allow Shift+Enter for new lines)
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            
            const label = document.createElement('span');
            label.className = 'label';
            label.innerText = sender === 'user' ? 'You' : 'Nexus AI';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            // If it's the AI, parse markdown. If user, just show text.
            if (sender === 'ai') {
                bubble.innerHTML = marked.parse(text);
            } else {
                bubble.innerText = text;
            }

            msgDiv.appendChild(label);
            msgDiv.appendChild(bubble);
            chatHistory.appendChild(msgDiv);
            
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        async function sendMessage() {
            const question = questionInput.value.trim();
            if (!question) return;

            addMessage(question, 'user');
            questionInput.value = '';
            
            typingIndicator.style.display = 'flex';
            chatHistory.scrollTop = chatHistory.scrollHeight;

            // Prepare the AI message bubble
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ai`;
            
            const label = document.createElement('span');
            label.className = 'label';
            label.innerText = 'Nexus AI';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = ''; // Start empty for streaming

            msgDiv.appendChild(label);
            msgDiv.appendChild(bubble);

            // Create EventSource for Streaming (SSE)
            const encodedQuestion = encodeURIComponent(question);
            const source = new EventSource(`/api/stream?question=${encodedQuestion}`);

            let fullText = ""; // Accumulate text for markdown parsing

            source.onmessage = function(event) {
                if (typingIndicator.style.display !== 'none') {
                    typingIndicator.style.display = 'none';
                    chatHistory.appendChild(msgDiv);
                }

                if (event.data === "[DONE]") {
                    source.close();
                } else if (event.data.startsWith("[ERROR]")) {
                    fullText += "\n\n*Error: " + event.data + "*";
                    bubble.innerHTML = marked.parse(fullText);
                    source.close();
                } else {
                    // Python sends <br> instead of \n to preserve SSE formatting.
                    // Replace <br> back to \n so marked.js can parse bold text and code blocks properly!
                    let chunk = event.data.replace(/<br>/g, '\n');
                    fullText += chunk;
                    bubble.innerHTML = marked.parse(fullText);
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                }
            };

            source.onerror = function(error) {
                source.close();
                typingIndicator.style.display = 'none';
                if (bubble.innerHTML === '') {
                    addMessage("Network Error: Could not connect to the stream.", 'ai');
                }
            };
        }
    </script>
</body>
</html>
